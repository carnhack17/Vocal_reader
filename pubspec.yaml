name: storyteller_app
description: Offline audiobook reader with avatar narrators - an addictive reading experience.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0

  # File & Storage
  path_provider: ^2.1.0
  file_picker: ^5.4.0
  sqflite: ^2.3.0

  # TTS (Text-to-Speech)
  flutter_tts: ^4.2.5

  # Audio Player
  just_audio: ^0.9.0

  # EPUB/Text Parsing
  epubx: any
  # Animations & Polish
  lottie: ^2.6.0
  flutter_animate: ^4.2.0

  # UI & Icons
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0

  # Date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/avatars/
    - assets/books/
    - assets/animations/
    - assets/sample_books/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
